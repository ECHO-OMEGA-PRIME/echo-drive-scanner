[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]
filterwarnings = [
  "error",
  "ignore:Using `httpx` with `starlette.testclient` is deprecated.*:starlette.testclient.StarletteDeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["dashboard", "intelligence", "storage", "scanner", "config"]
omit = ["tests/*", ".venv/*"]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_covered = true
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".git", ".venv", "__pycache__", "data", "logs", "quarantine"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B008", "B904"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]

[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
exclude = "(^|/)(.venv|data|logs|quarantine)/"
